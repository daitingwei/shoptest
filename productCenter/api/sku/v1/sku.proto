syntax = "proto3";

package sku.v1;

import "google/api/annotations.proto";

option go_package = "productCenter/api/sku/v1;v1";

// 商品SKU服务
service Sku {
  // 创建SKU
  rpc CreateSku (CreateSkuRequest) returns (CreateSkuResponse) {
    option (google.api.http) = {
      post: "/api/v1/skus"
      body: "*"
    };
  }
  // 更新SKU
  rpc UpdateSku (UpdateSkuRequest) returns (UpdateSkuResponse) {
    option (google.api.http) = {
      put: "/api/v1/skus/{id}"
      body: "*"
    };
  }
  // 查看SKU详情
  rpc GetSku (GetSkuRequest) returns (GetSkuResponse) {
    option (google.api.http) = {
      get: "/api/v1/skus/{id}"
    };
  }
  // 分页查询SKU列表（支持按商品筛选）
  rpc ListSkus (ListSkusRequest) returns (ListSkusResponse) {
    option (google.api.http) = {
      get: "/api/v1/skus"
    };
  }
  // 删除SKU
  rpc DeleteSku (DeleteSkuRequest) returns (DeleteSkuResponse) {
    option (google.api.http) = {
      delete: "/api/v1/skus/{id}"
    };
  }
}

// SKU实体
message SkuInfo {
  int64  id = 1;
  int64  product_id = 2;
  string sku = 3;          // 规格串，如 "红色;XL"
  string title = 4;        // SKU标题
  int64  price = 5;        // 分
  int64  stock = 6;        // 库存
  string img_url = 7;      // SKU主图
  string created_at = 8;
  string updated_at = 9;
}

// 创建SKU
message CreateSkuRequest {
  int64  product_id = 1;
  string sku = 2;
  string title = 3;
  int64  price = 4;
  int64  stock = 5;
  string img_url = 6;
}

message CreateSkuResponse {
  SkuInfo sku = 1;
}

// 更新SKU
message UpdateSkuRequest {
  int64  id = 1;
  int64  product_id = 2;
  string sku = 3;
  string title = 4;
  int64  price = 5;
  int64  stock = 6;
  string img_url = 7;
}

message UpdateSkuResponse {
  SkuInfo sku = 1;
}

// 查看SKU详情
message GetSkuRequest {
  int64 id = 1;
}

message GetSkuResponse {
  SkuInfo sku = 1;
}

// 分页查询SKU列表
message ListSkusRequest {
  int32 page = 1;        // 页码，默认 1
  int32 page_size = 2;   // 每页条数，默认 10
  int64 product_id = 3;  // 按商品筛选（0=全部）
}

message ListSkusResponse {
  repeated SkuInfo skus = 1;
  int32 total = 2;
  int32 page = 3;
  int32 page_size = 4;
}

// 删除SKU
message DeleteSkuRequest {
  int64 id = 1;
}

message DeleteSkuResponse {
  bool success = 1;
}
